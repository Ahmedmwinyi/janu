<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Image Search</title>
	<link rel="stylesheet" type="text/css" href="includes/adcanced.css">
</head>
<body>
	<header>
		<ul>
			<li id="aimage"><img src="images/image.png"></li>
			<li id="main"><a href="index.html">Back</a></li>
		</ul>
	</header>
	<section>
		<h2>Advanced Search</h2>
		<div class="container">
			<form action="https://google.com/search" target="_blank">
				<div class="head">
					<h3>Find Pages with</h3>
				</div>
				<div class="label1">
					<label for="1">all these words:</label>
				</div>
				<div class="input1">
					<input type="text" name="as_q" id="1">
				</div>
				<div class="label2">
					<label for="2">this exact words or phrase:</label>
				</div>
				<div class="input2">
					<input type="text" name="as_x" id="2">
				</div>
				<div class="label3">
					<label for="3">any of these words:</label>
				</div>
				<input type="text" name="as_y" id="3">
				<div class="label4">
					<label for="3">none of these words:</label>
				</div>
				<input type="text" name="as_z" id="4">
				<div class="button">
					<input type="submit" value="Advanced Search">
				</div>
			</form>
		</div>
	</section>
	<footer>
		<div class="foot">
			<ul>
				<li><a href="#">Tanzania</a></li>
			</ul>
		</div>
		<div class="down">
			<ul>
				<li><a href="#">Advertising</a></li>
				<li><a href="#">Business</a></li>
				<li><a href="#">How Search Works</a></li>
				<li><a href="#">Privacy</a></li>
				<li><a href="#">Terms</a></li>
				<li><a href="#">Settings</a></li>
			</ul>
		</div>
	</footer>
</body>
</html>
